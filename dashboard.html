<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deborah Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #E5F0FA; margin:0; padding:0; color:#000; }
        .header { background: #A2D2FF; padding:20px; text-align:center; }
        .card { background:#BDE0FE; border-radius:15px; padding:25px; margin:20px; }
        .week-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:15px; padding:20px; }
        .week-tile { background:#8FC9FF; padding:20px; border-radius:12px; text-align:center; cursor:pointer; font-size:1.1em; }
        button { background:#8FC9FF; padding:10px 16px; margin:5px; border:none; border-radius:8px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐝 Deborah - Year 9 Civics 2026</h1>
        <p>Welcome, <span id="userCode">Teacher</span></p>
    </div>

    <div class="card">
        <h2>Admin Tools (Teachers Only)</h2>
        <button onclick="createTeacher()">Create New Teacher Account</button>
        <button onclick="createStudent()">Add New Student (Random Code)</button>
        <button onclick="viewReport()">View Class Report</button>
    </div>

    <div class="card">
        <h2>Course Dashboard</h2>
        <div class="week-grid">
            <a href="week1-lesson1.html" class="lesson-link"><div class="week-tile">Week 1</div></a>
            <a href="week2-lesson1.html" class="lesson-link"><div class="week-tile">Week 2</div></a>
            <a href="week3-lesson1.html" class="lesson-link"><div class="week-tile">Week 3</div></a>
            <a href="week4-lesson1.html" class="lesson-link"><div class="week-tile">Week 4</div></a>
            <a href="week5-lesson1.html" class="lesson-link"><div class="week-tile">Week 5</div></a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code') || 'Teacher';
        document.getElementById('userCode').textContent = code;

        function createTeacher() {
            const newCode = "TA" + Math.random().toString(36).substring(2,6).toUpperCase();
            alert("New Teacher Account Created!\nCode: " + newCode + "\nPassword: same as code");
        }

        function createStudent() {
            const newCode = "S" + Math.random().toString(36).substring(2,6).toUpperCase();
            alert("New Student Added!\nCode: " + newCode);
        }

        function viewReport() {
            window.location.href = 'teacher-report.html';
        }
    </script>
</body>
</html>
