<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deborah Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #E5F0FA; margin:0; padding:0; color:#000; }
        .header { background: #A2D2FF; padding:20px; text-align:center; }
        .card { background:#BDE0FE; border-radius:15px; padding:25px; margin:20px; }
        .week-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:15px; padding:20px; }
        .week-tile { background:#8FC9FF; padding:25px; border-radius:12px; text-align:center; cursor:pointer; font-size:1.1em; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐝 Deborah - Year 9 Civics</h1>
        <p>Welcome, <span id="userCode">Student</span></p>
    </div>

    <div class="card">
        <h2>Course Dashboard</h2>
        <div class="week-grid">
            <div class="week-tile" onclick="alert('Week 1: Constitution & Eureka Stockade')">Week 1</div>
            <div class="week-tile" onclick="alert('Week 2: Policy & Making Laws')">Week 2</div>
            <div class="week-tile" onclick="alert('Week 3: Legal System & Courts')">Week 3</div>
            <div class="week-tile" onclick="alert('Week 4: Civic Participation')">Week 4</div>
            <div class="week-tile" onclick="alert('Week 5: Media, Diversity & Global Citizenship')">Week 5</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('userCode').textContent = urlParams.get('code') || 'Student';
    </script>
</body>
</html>
